set -g default-terminal "screen-256color"

# auto renumber windows for no gaps
set -g renumber-windows on

# set movement keys to Vim style in copy mode
setw -g mode-keys vi

## remap prefix
#set -g prefix C-j
#unbind C-b
#bind C-j send-prefix

# resize pane left and right
# (can resize by default ok up and down by
#  using Prefix, C-Up or C-Down)
bind C-Left resize-pane -L  # doesn't work :(

# move window left and right
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# shortcut to reload tmux config
unbind r
bind r source-file ~/.tmux.conf
